<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOU DIED — WRAECLAST HC</title>

    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /*
        These styles only exist on the 404 page so we write
        them here instead of adding them to style.css.
        Small pages with unique styles = keep them local.
        */

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
        }

        /*
        The skull pulses slowly using a CSS animation.
        @keyframes defines the animation — the browser
        smoothly interpolates between each step.
        */
        .death-skull {
            font-size: 6rem;
            animation: pulse 3s ease-in-out infinite;
            margin-bottom: 1.5rem;
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1);    opacity: 1; }
            50%       { transform: scale(1.08); opacity: 0.7; }
        }

        /*
        "YOU DIED" text — large, red, with a glowing text-shadow.
        The shadow is layered: tight bright core + wide soft bloom.
        */
        .you-died {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--accent-danger);
            letter-spacing: 8px;
            text-shadow:
                0 0 20px rgba(255, 68, 68, 0.8),
                0 0 60px rgba(255, 68, 68, 0.4);
            margin-bottom: 1rem;
            animation: flicker 4s ease-in-out infinite;
        }

        /*
        A subtle flicker — like a dying torch.
        Small opacity changes feel organic, not mechanical.
        */
        @keyframes flicker {
            0%, 90%, 100% { opacity: 1; }
            92%           { opacity: 0.8; }
            94%           { opacity: 1; }
            96%           { opacity: 0.6; }
            98%           { opacity: 1; }
        }

        .error-code {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 4px;
            margin-bottom: 2rem;
        }

        .death-message {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 480px;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .death-message em {
            color: var(--accent-primary);
            font-style: normal;
        }

        /* Buttons row */
        .death-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-respawn {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
            padding: 0.75rem 1.8rem;
            border-radius: var(--radius);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: rgba(200, 162, 78, 0.15);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn-primary:hover {
            background: rgba(200, 162, 78, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(200, 162, 78, 0.2);
        }

        .btn-secondary {
            background: none;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text-muted);
            transform: translateY(-2px);
        }

        /* Countdown timer text */
        .respawn-timer {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .respawn-timer span {
            color: var(--accent-primary);
        }
    </style>
</head>

<body>

    <div class="death-skull">☠</div>

    <h1 class="you-died">YOU DIED</h1>

    <p class="error-code">ERROR 404 — PAGE NOT FOUND</p>

    <p class="death-message">
        The page you were looking for has been <em>consumed by the darkness.</em>
        Perhaps you mistyped the URL, or the page never existed.
        Either way — this is HC. There are no second chances.
    </p>

    <div class="death-actions">
        <a href="/poe2-hc-ssf/" class="btn-respawn btn-primary">↩ Respawn at Checkpoint</a>
        <a href="/poe2-hc-ssf/tools/rip-tracker.html" class="btn-respawn btn-secondary">Log this death</a>
    </div>

    <p class="respawn-timer" id="respawn-timer">
        Auto-respawning in <span id="countdown">10</span> seconds...
    </p>

    <script>
        /*
        Countdown timer — counts down from 10 and redirects
        to the home page automatically.
        setInterval() runs a function repeatedly on a timer.
        clearInterval() stops it.
        */
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '/poe2-hc-ssf/';
            }
        }, 1000); // 1000 milliseconds = 1 second
    </script>

</body>
</html>
